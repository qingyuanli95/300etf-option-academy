<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#6366f1">
    <title>模拟考试 - 300ETF期权学院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f8fafc;
            color: #1f2937;
            line-height: 1.6;
        }
        
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 1000;
        }
        
        .nav-back {
            color: white;
            font-size: 1.5rem;
            text-decoration: none;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-title {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            flex: 1;
            text-align: center;
        }
        
        .timer {
            color: white;
            font-size: 1rem;
            font-weight: 600;
            background: rgba(255,255,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
        }
        
        .timer.warning {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        .container {
            padding: 72px 16px 120px;
            max-width: 100%;
        }
        
        .progress-section {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .progress-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        
        .progress-bar {
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #10b981);
            border-radius: 4px;
            transition: width 0.3s;
        }
        
        .question-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        
        .question-number {
            display: inline-block;
            background: #6366f1;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        
        .question-text {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 16px;
            line-height: 1.7;
        }
        
        .options-list {
            list-style: none;
        }
        
        .option-item {
            padding: 14px 16px;
            margin-bottom: 10px;
            background: #f8fafc;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .option-item:active {
            transform: scale(0.98);
        }
        
        .option-item.selected {
            border-color: #6366f1;
            background: rgba(99,102,241,0.1);
        }
        
        .option-item.correct {
            border-color: #10b981;
            background: rgba(16,185,129,0.1);
        }
        
        .option-item.wrong {
            border-color: #ef4444;
            background: rgba(239,68,68,0.1);
        }
        
        .option-label {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .option-item.selected .option-label {
            background: #6366f1;
            color: white;
        }
        
        .option-item.correct .option-label {
            background: #10b981;
            color: white;
        }
        
        .option-item.wrong .option-label {
            background: #ef4444;
            color: white;
        }
        
        .option-text {
            flex: 1;
            font-size: 0.95rem;
        }
        
        .explanation {
            margin-top: 16px;
            padding: 16px;
            background: #f0fdf4;
            border-radius: 12px;
            border-left: 4px solid #10b981;
            display: none;
        }
        
        .explanation.show {
            display: block;
        }
        
        .explanation-title {
            font-weight: 600;
            color: #166534;
            margin-bottom: 8px;
        }
        
        .explanation-text {
            color: #166534;
            font-size: 0.9rem;
            line-height: 1.7;
        }
        
        .action-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e5e7eb;
            padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
            display: flex;
            gap: 12px;
            z-index: 999;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            text-align: center;
        }
        
        .btn-prev {
            background: #f3f4f6;
            color: #6b7280;
        }
        
        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-next {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
        }
        
        .btn-submit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        
        .result-container {
            display: none;
            padding: 72px 16px;
        }
        
        .result-container.show {
            display: block;
        }
        
        .score-card {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 20px;
            padding: 32px;
            text-align: center;
            color: white;
            margin-bottom: 20px;
        }
        
        .score-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        
        .score-value {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        
        .score-result {
            font-size: 1.2rem;
            font-weight: 600;
            padding: 8px 20px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .score-result.pass {
            background: rgba(16,185,129,0.3);
        }
        
        .score-result.fail {
            background: rgba(239,68,68,0.3);
        }
        
        .stats-detail {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }
        
        .stats-row:last-child {
            border-bottom: none;
        }
        
        .start-screen {
            padding: 72px 16px;
            text-align: center;
        }
        
        .start-card {
            background: white;
            border-radius: 20px;
            padding: 40px 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        
        .start-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        
        .start-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .start-desc {
            color: #6b7280;
            margin-bottom: 24px;
            line-height: 1.7;
        }
        
        .exam-info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .exam-info-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
        }
        
        .exam-info-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: #6366f1;
        }
        
        .exam-info-label {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 4px;
        }
        
        .btn-start-exam {
            display: block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
        }
        
        @media (min-width: 768px) {
            .container {
                max-width: 800px;
                margin: 0 auto;
            }
            
            .action-bar {
                max-width: 800px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="exam-zone.html" class="nav-back">←</a>
        <span class="nav-title">模拟考试</span>
        <span class="timer" id="timer">30:00</span>
    </nav>
    
    <!-- 开始页面 -->
    <div class="start-screen" id="startScreen">
        <div class="start-card">
            <div class="start-icon">📝</div>
            <h1 class="start-title">期权知识测试模拟</h1>
            <p class="start-desc"></p>
            <div class="exam-info-grid">
                <div class="exam-info-item">
                    <div class="exam-info-value">30</div>
                    <div class="exam-info-label">题目数量</div>
                </div>
                <div class="exam-info-item">
                    <div class="exam-info-value">30</div>
                    <div class="exam-info-label">考试时长(分钟)</div>
                </div>
                <div class="exam-info-item">
                    <div class="exam-info-value">80</div>
                    <div class="exam-info-label">及格分数</div>
                </div>
            </div>
            
            <button class="btn-start-exam" onclick="startExam()">开始考试</button>
        </div>
        
        <div style="background: white; border-radius: 16px; padding: 20px; text-align: left;">
            <h3 style="margin-bottom: 16px;">📋 考试说明</h3>
            <ul style="color: #6b7280; line-height: 2; padding-left: 20px;">
                <li>本次考试从题库中随机抽取30道题目</li>
                <li>题型包括单选题、多选题和判断题</li>
                <li>满分100分，80分及格</li>
                <li>考试时间30分钟，超时自动交卷</li>
                <li>可随时返回修改答案</li>
                <li>交卷后可查看答案解析</li>
            </ul>
        </div>
    </div>
    
    <!-- 考试界面 -->
    <div class="container" id="examContainer" style="display: none;">
        <div class="progress-section">
            <div class="progress-info">
                <span>答题进度</span>
                <span id="progressText">1/30</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressBar" style="width: 3.3%"></div>
            </div>
        </div>
        
        <div id="questionArea"></div>
    </div>
    
    <!-- 结果页面 -->
    <div class="result-container" id="resultContainer">
        <div class="score-card">
            <div class="score-label">考试得分</div>
            <div class="score-value" id="scoreValue">0</div>
            <div class="score-result" id="scoreResult">未通过</div>
        </div>
        
        <div class="stats-detail">
            <div class="stats-row">
                <span>答题用时</span>
                <span id="timeUsed">0分钟</span>
            </div>
            <div class="stats-row">
                <span>答对题数</span>
                <span id="correctCount">0/30</span>
            </div>
            <div class="stats-row">
                <span>正确率</span>
                <span id="accuracy">0%</span>
            </div>
        </div>
        
        <button class="btn btn-next" onclick="reviewExam()">查看解析</button>
        <button class="btn btn-prev" onclick="location.href='exam-zone.html'" style="margin-top: 12px;">返回考试专区</button>
    </div>
    
    <!-- 底部操作栏 -->
    <div class="action-bar" id="actionBar" style="display: none;">
        <button class="btn btn-prev" id="prevBtn" onclick="prevQuestion()">上一题</button>
        <button class="btn btn-next" id="nextBtn" onclick="nextQuestion()">下一题</button>
        <button class="btn btn-submit" id="submitBtn" onclick="submitExam()" style="display: none;">提交试卷</button>
    </div>
    
    <script>
        // 大题库（100题）
        const questionBank = [
            // 期权基础概念 (1-25)
            { id: 1, type: '单选', question: '期权是一种（），它赋予买方在约定时间以约定价格买入或卖出标的资产的权利。', options: ['权利', '义务', '合约', '承诺'], answer: 2, explanation: '期权是一种合约，它赋予买方在约定时间以约定价格买入或卖出标的资产的权利，但买方不承担必须买入或卖出的义务。' },
            { id: 2, type: '单选', question: '认购期权（Call Option）赋予买方（）。', options: ['以约定价格卖出标的资产的权利', '以约定价格买入标的资产的权利', '必须买入标的资产的义务', '必须卖出标的资产的义务'], answer: 1, explanation: '认购期权（Call Option）赋予买方以约定价格买入标的资产的权利，买方有权选择是否行权。' },
            { id: 3, type: '单选', question: '认沽期权（Put Option）赋予买方（）。', options: ['以约定价格买入标的资产的权利', '以约定价格卖出标的资产的权利', '必须买入标的资产的义务', '必须卖出标的资产的义务'], answer: 1, explanation: '认沽期权（Put Option）赋予买方以约定价格卖出标的资产的权利。' },
            { id: 4, type: '单选', question: '期权买方支付（）给卖方以获得期权合约赋予的权利。', options: ['保证金', '权利金', '手续费', '印花税'], answer: 1, explanation: '期权买方支付权利金（Premium）给卖方，以获得期权合约赋予的权利。权利金是买方为获得权利而支付的对价。' },
            { id: 5, type: '单选', question: '期权卖方收取权利金后，（）。', options: ['没有任何义务', '承担履行合约的义务', '可以随时反悔', '只承担部分义务'], answer: 1, explanation: '期权卖方收取权利金后，承担履行合约的义务。当买方选择行权时，卖方必须履行合约。' },
            { id: 6, type: '单选', question: '沪深300ETF期权的标的是（）。', options: ['沪深300指数', '华泰柏瑞沪深300ETF（510300）', '嘉实沪深300ETF（159919）', '以上都是'], answer: 3, explanation: '沪深300ETF期权有两个品种：上交所的华泰柏瑞沪深300ETF期权（标的510300）和深交所的嘉实沪深300ETF期权（标的159919）。' },
            { id: 7, type: '单选', question: '期权合约要素不包括（）。', options: ['标的资产', '行权价格', '交易价格', '到期日'], answer: 2, explanation: '期权合约要素包括：标的资产、行权价格、到期日、合约单位、权利金等。交易价格（权利金）是市场交易形成的，不是合约固定要素。' },
            { id: 8, type: '单选', question: '欧式期权只能在（）行权。', options: ['到期日当天', '到期日前任何交易日', '到期日后10天内', '任何时间'], answer: 0, explanation: '欧式期权只能在到期日当天行权，而美式期权可以在到期日前任何交易日行权。沪深300ETF期权是欧式期权。' },
            { id: 9, type: '单选', question: '当标的资产价格 > 行权价格时，认购期权处于（）。', options: ['实值状态', '平值状态', '虚值状态', '无效状态'], answer: 0, explanation: '对于认购期权：标的价格 > 行权价为实值；标的价格 = 行权价为平值；标的价格 < 行权价为虚值。' },
            { id: 10, type: '单选', question: '当标的资产价格 < 行权价格时，认沽期权处于（）。', options: ['实值状态', '平值状态', '虚值状态', '无效状态'], answer: 0, explanation: '对于认沽期权：标的价格 < 行权价为实值；标的价格 = 行权价为平值；标的价格 > 行权价为虚值。' },
            { id: 11, type: '单选', question: '期权的内在价值（）。', options: ['总是大于零', '总是小于零', '可以为零', '等于权利金'], answer: 2, explanation: '期权的内在价值可以为正（实值期权）、为零（平值或虚值期权），但不会为负。内在价值+时间价值=权利金。' },
            { id: 12, type: '单选', question: '期权的时间价值随着到期日临近（）。', options: ['增加', '减少', '不变', '先增后减'], answer: 1, explanation: '期权的时间价值随着到期日临近而衰减，这种现象称为时间价值的衰减或"时间损耗"。到期日当天时间价值归零。' },
            { id: 13, type: '单选', question: '期权交易的四种基本操作是（）。', options: ['买入开仓、买入平仓、卖出开仓、卖出平仓', '买入看涨、买入看跌、卖出看涨、卖出看跌', '开仓、平仓、行权、放弃', '认购、认沽、实值、虚值'], answer: 0, explanation: '期权交易的四种基本操作：买入开仓（建立买方头寸）、买入平仓（了结卖方头寸）、卖出开仓（建立卖方头寸）、卖出平仓（了结买方头寸）。' },
            { id: 14, type: '单选', question: '期权卖方需要缴纳（）。', options: ['权利金', '保证金', '手续费', '以上都要'], answer: 1, explanation: '期权卖方需要缴纳保证金作为履约担保。买方支付权利金，不需要缴纳保证金。' },
            { id: 15, type: '单选', question: '沪深300ETF期权合约单位是（）。', options: ['100份', '1000份', '10000份', '由交易所规定'], answer: 2, explanation: '沪深300ETF期权合约单位是10000份，即每张期权合约对应10000份ETF基金份额。' },
            { id: 16, type: '单选', question: '期权买方最大损失为（）。', options: ['无限大', '权利金', '保证金', '标的资产价值'], answer: 1, explanation: '期权买方的最大损失是已支付的权利金。买方的风险有限，收益潜力（认购）无限或（认沽）较大。' },
            { id: 17, type: '单选', question: '认购期权卖方最大损失为（）。', options: ['权利金', '无限大', '行权价', '零'], answer: 1, explanation: '认购期权卖方最大损失理论上是无限的，因为标的资产价格上涨没有上限。卖方收取有限权利金，承担无限风险。' },
            { id: 18, type: '单选', question: '认沽期权卖方最大损失为（）。', options: ['权利金', '无限大', '行权价-标的资产价格', '行权价'], answer: 3, explanation: '认沽期权卖方最大损失为行权价（当标的资产价格跌至零时）。虽然有限，但可能很大。' },
            { id: 19, type: '单选', question: '备兑开仓策略是指（）。', options: ['持有标的资产并卖出认购期权', '持有标的资产并买入认沽期权', '卖出认购期权并买入认沽期权', '买入认购期权并卖出认沽期权'], answer: 0, explanation: '备兑开仓策略是指持有标的资产（如ETF）的同时，卖出该标的的认购期权，通过收取权利金增强收益。' },
            { id: 20, type: '单选', question: '保险策略是指（）。', options: ['持有标的资产并卖出认购期权', '持有标的资产并买入认沽期权', '卖出认购期权并买入认沽期权', '买入认购期权并卖出认沽期权'], answer: 1, explanation: '保险策略是指持有标的资产的同时，买入该标的的认沽期权，为标的资产价格下跌提供保护，类似购买保险。' },
            { id: 21, type: '单选', question: '期权的杠杆效应体现在（）。', options: ['用少量资金控制较大价值的标的', '没有杠杆', '杠杆比期货小', '只存在于买方'], answer: 0, explanation: '期权具有杠杆效应，买方只需支付少量权利金，就能控制较大价值的标的资产，放大收益和风险。' },
            { id: 22, type: '单选', question: '波动率上升时，期权价格（）。', options: ['上升', '下降', '不变', '不确定'], answer: 0, explanation: '波动率是影响期权价格的重要因素。波动率上升意味着标的资产价格变动幅度可能增大，期权买方获利机会增加，因此期权价格上升。' },
            { id: 23, type: '单选', question: '认购期权的盈亏平衡点为（）。', options: ['行权价', '行权价+权利金', '行权价-权利金', '权利金'], answer: 1, explanation: '认购期权的盈亏平衡点 = 行权价 + 权利金。当标的价格超过此价格时，买方开始盈利。' },
            { id: 24, type: '单选', question: '认沽期权的盈亏平衡点为（）。', options: ['行权价', '行权价+权利金', '行权价-权利金', '权利金'], answer: 2, explanation: '认沽期权的盈亏平衡点 = 行权价 - 权利金。当标的价格低于此价格时，买方开始盈利。' },
            { id: 25, type: '单选', question: '期权合约到期日为到期月份的（）。', options: ['第一个星期三', '第二个星期三', '第三个星期三', '第四个星期三'], answer: 3, explanation: '沪深300ETF期权合约到期日为到期月份的第四个星期三（遇法定节假日顺延）。' },
            
            // 交易规则 (26-50)
            { id: 26, type: '单选', question: '期权买方行权后，（）。', options: ['立即获得收益', '需要缴纳保证金', '获得标的资产头寸', '自动平仓'], answer: 2, explanation: '期权买方行权后，获得相应的标的资产头寸（认购行权获得标的资产多头，认沽行权获得标的资产空头）。' },
            { id: 27, type: '单选', question: '深度实值期权的时间价值（）。', options: ['很大', '很小或为零', '等于平值期权', '不确定'], answer: 1, explanation: '深度实值期权的时间价值通常很小或接近零，因为内在价值占主导，时间价值占比很小。' },
            { id: 28, type: '单选', question: '平值期权的时间价值（）。', options: ['最小', '最大', '为零', '不确定'], answer: 1, explanation: '平值期权的时间价值通常最大，因为标的价格接近行权价时，未来变为实值或虚值的不确定性最大。' },
            { id: 29, type: '单选', question: '期权的Delta表示（）。', options: ['期权价格对标的资产价格的敏感度', '期权价格对时间的敏感度', '期权价格对波动率的敏感度', '期权价格对利率的敏感度'], answer: 0, explanation: 'Delta表示期权价格对标的资产价格变动的敏感度，即标的价格变动1元时期权价格变动的金额。' },
            { id: 30, type: '单选', question: '个人投资者参与期权交易，需要满足的条件不包括（）。', options: ['开户满6个月', '具备期权基础知识', '具有相应的风险承受能力', '必须具有期货实盘交易经验'], answer: 3, explanation: '个人投资者参与期权交易需要满足：开户满6个月、具备期权基础知识、通过交易所认可的知识测试、具有相应的风险承受能力等。但不要求必须有期货实盘交易经验。' },
            { id: 31, type: '单选', question: 'ETF期权的最小变动价位为（）。', options: ['0.0001元', '0.0005元', '0.001元', '0.01元'], answer: 0, explanation: 'ETF期权的最小变动价位为0.0001元（即0.01分）。' },
            { id: 32, type: '单选', question: '期权合约的最后交易日为（）。', options: ['到期月份的第一个周五', '到期月份的第二个周五', '到期月份的第三个周五', '到期月份的第四个周三'], answer: 3, explanation: 'ETF期权的最后交易日为到期月份的第四个星期三（遇法定节假日顺延）。' },
            { id: 33, type: '单选', question: '期权合约的行权日为（）。', options: ['最后交易日', '最后交易日的下一个交易日', '到期月份的最后一个交易日', '到期月份的第三个周三'], answer: 0, explanation: 'ETF期权的行权日与最后交易日相同，为到期月份的第四个星期三。' },
            { id: 34, type: '单选', question: '期权合约的交割方式为（）。', options: ['现金交割', '实物交割', '可以选择现金或实物', '由交易所决定'], answer: 1, explanation: 'ETF期权采用实物交割方式，即认购期权买方行权时获得ETF份额，认沽期权买方行权时交付ETF份额获得现金。' },
            { id: 35, type: '单选', question: '期权合约的涨跌停幅度为（）。', options: ['10%', '±10%', '±20%', '根据标的涨跌幅计算'], answer: 3, explanation: '期权合约的涨跌停幅度不是固定的，而是根据标的ETF的涨跌幅和期权本身的价格计算得出，公式较为复杂。' },
            { id: 36, type: '单选', question: '期权的持仓限额是指（）。', options: ['投资者可以持有的最大合约数量', '投资者可以交易的最大金额', '投资者可以开仓的最大次数', '投资者可以行权的最大次数'], answer: 0, explanation: '持仓限额是指投资者对单个合约品种可以持有的最大合约数量，包括权利仓限额、总持仓限额和单日买入开仓限额。' },
            { id: 37, type: '单选', question: '期权交易的手续费包括（）。', options: ['交易经手费', '交易结算费', '行权结算费', '以上都是'], answer: 3, explanation: '期权交易的手续费包括交易经手费、交易结算费，行权时还有行权结算费。' },
            { id: 38, type: '单选', question: '期权的做市商制度是指（）。', options: ['由做市商提供双边报价', '由投资者互相报价', '由交易所定价', '由标的资产价格决定'], answer: 0, explanation: '做市商制度是指由具备一定实力和信誉的法人作为做市商，向投资者提供双边报价，接受投资者的买卖要求。' },
            { id: 39, type: '单选', question: '期权合约的价格由（）决定。', options: ['交易所规定', '市场供需', '标的资产价格', '以上都是'], answer: 1, explanation: '期权合约的价格（权利金）由市场供需决定，通过竞价交易形成，受标的资产价格、行权价、剩余期限、波动率等多种因素影响。' },
            { id: 40, type: '单选', question: '期权买方开仓时需要支付（）。', options: ['权利金', '保证金', '权利金和保证金', '只需支付手续费'], answer: 0, explanation: '期权买方开仓时只需支付权利金，不需要缴纳保证金。' },
            { id: 41, type: '单选', question: '期权卖方平仓时收回（）。', options: ['权利金', '保证金', '权利金和保证金', '只需支付手续费'], answer: 1, explanation: '期权卖方平仓时收回保证金，并根据平仓价格与开仓价格的差额计算盈亏。' },
            { id: 42, type: '单选', question: '期权合约的代码格式为（）。', options: ['标的代码+购/沽+到期月份+行权价', '标的代码+行权价+购/沽+到期月份', '到期月份+标的代码+购/沽+行权价', '行权价+标的代码+购/沽+到期月份'], answer: 0, explanation: '期权合约代码格式为：标的代码+购（C）/沽（P）+到期年份（后两位）+到期月份（两位）+行权价（整数部分5位，小数部分3位）。' },
            { id: 43, type: '单选', question: '期权合约的月份为（）。', options: ['当月、下月及随后两个季月', '当月、下月及随后三个季月', '每个月都有合约', '当季及随后三个季月'], answer: 0, explanation: 'ETF期权合约月份为当月、下月及随后两个季月（3月、6月、9月、12月）。' },
            { id: 44, type: '单选', question: '期权的熔断机制是指（）。', options: ['价格达到涨跌停板时暂停交易', '价格波动过大时暂停交易', '交易量过大时暂停交易', '持仓量过大时暂停交易'], answer: 1, explanation: '期权熔断机制是指当期权合约价格较前收盘价涨跌达到或超过一定比例时，该合约进入熔断状态，暂停交易一段时间。' },
            { id: 45, type: '单选', question: '期权交易的竞价方式为（）。', options: ['集合竞价和连续竞价', '只有集合竞价', '只有连续竞价', '做市商报价'], answer: 0, explanation: '期权交易采用集合竞价和连续竞价两种方式。开盘采用集合竞价，盘中采用连续竞价。' },
            { id: 46, type: '单选', question: '期权合约的行权价格间距为（）。', options: ['固定值', '根据标的价格分档设置', '由交易所每日公布', '由做市商决定'], answer: 1, explanation: 'ETF期权的行权价格间距根据标的价格分档设置：3元以下为0.05元，3元至5元为0.1元，5元至10元为0.25元等。' },
            { id: 47, type: '单选', question: '期权合约的新增行权价格（）。', options: ['每日增加', '每周增加', '根据标的价格变化自动增加', '由交易所决定'], answer: 2, explanation: '当标的价格发生变化，现有行权价格不能覆盖标的价格上下浮动范围时，会自动新增行权价格。' },
            { id: 48, type: '单选', question: '期权的强行平仓是指（）。', options: ['投资者主动平仓', '证券公司强制平仓', '交易所强制平仓', '结算公司强制平仓'], answer: 1, explanation: '强行平仓是指当投资者保证金不足且未及时补足时，证券公司对投资者的持仓进行强制平仓。' },
            { id: 49, type: '单选', question: '期权交易的结算价是（）。', options: ['当日收盘价', '当日加权平均价', '当日成交量最大的价格', '由交易所确定'], answer: 1, explanation: '期权交易的结算价通常为当日该合约的加权平均价，用于计算当日盈亏和保证金。' },
            { id: 50, type: '单选', question: '期权买方的权利仓限额根据（）确定。', options: ['投资者资产规模', '投资者交易经验', '投资者风险承受能力', '以上都是'], answer: 3, explanation: '期权买方的权利仓限额根据投资者的资产规模、交易经验、风险承受能力等因素综合确定。' },
            
            // 风险与盈亏 (51-75)
            { id: 51, type: '单选', question: '买入认购期权的最大收益为（）。', options: ['权利金', '无限大', '行权价', '标的价格'], answer: 1, explanation: '买入认购期权的最大收益理论上是无限的，因为标的资产价格上涨没有上限。' },
            { id: 52, type: '单选', question: '买入认沽期权的最大收益为（）。', options: ['权利金', '无限大', '行权价-权利金', '行权价'], answer: 2, explanation: '买入认沽期权的最大收益为行权价减去权利金（当标的资产价格跌至零时）。' },
            { id: 53, type: '单选', question: '卖出认购期权的最大收益为（）。', options: ['权利金', '无限大', '行权价', '标的价格'], answer: 0, explanation: '卖出认购期权的最大收益是收取的权利金，当标的资产价格低于或等于行权价时获得。' },
            { id: 54, type: '单选', question: '卖出认沽期权的最大收益为（）。', options: ['权利金', '无限大', '行权价', '标的价格'], answer: 0, explanation: '卖出认沽期权的最大收益是收取的权利金，当标的资产价格高于或等于行权价时获得。' },
            { id: 55, type: '单选', question: '期权的时间价值最大的情况是（）。', options: ['深度实值', '平值', '深度虚值', '到期日'], answer: 1, explanation: '平值期权的时间价值最大，因为标的价格接近行权价时，未来变为实值或虚值的不确定性最大。' },
            { id: 56, type: '单选', question: '期权的Gamma表示（）。', options: ['Delta对标的资产价格的敏感度', '期权价格对时间的敏感度', '期权价格对波动率的敏感度', '期权价格对利率的敏感度'], answer: 0, explanation: 'Gamma表示Delta对标的资产价格变动的敏感度，即标的价格变动1元时Delta变动的值。' },
            { id: 57, type: '单选', question: '期权的Theta表示（）。', options: ['期权价格对时间的敏感度', 'Delta对标的资产价格的敏感度', '期权价格对波动率的敏感度', '期权价格对利率的敏感度'], answer: 0, explanation: 'Theta表示期权价格对时间变化的敏感度，即时间每流逝一天期权价格的变化。' },
            { id: 58, type: '单选', question: '期权的Vega表示（）。', options: ['期权价格对波动率的敏感度', '期权价格对时间的敏感度', 'Delta对标的资产价格的敏感度', '期权价格对利率的敏感度'], answer: 0, explanation: 'Vega表示期权价格对波动率变化的敏感度，即波动率每变化1%时期权价格的变化。' },
            { id: 59, type: '单选', question: '期权的Rho表示（）。', options: ['期权价格对利率的敏感度', '期权价格对时间的敏感度', '期权价格对波动率的敏感度', 'Delta对标的资产价格的敏感度'], answer: 0, explanation: 'Rho表示期权价格对无风险利率变化的敏感度，即利率每变化1%时期权价格的变化。' },
            { id: 60, type: '单选', question: '买入跨式组合是指（）。', options: ['同时买入认购和认沽', '同时卖出认购和认沽', '买入认购卖出认沽', '卖出认购买入认沽'], answer: 0, explanation: '买入跨式组合（Long Straddle）是指同时买入相同行权价、相同到期日的认购期权和认沽期权，预期标的价格大幅波动。' },
            { id: 61, type: '单选', question: '卖出跨式组合是指（）。', options: ['同时卖出认购和认沽', '同时买入认购和认沽', '卖出认购买入认沽', '买入认购卖出认沽'], answer: 0, explanation: '卖出跨式组合（Short Straddle）是指同时卖出相同行权价、相同到期日的认购期权和认沽期权，预期标的价格稳定。' },
            { id: 62, type: '单选', question: '买入宽跨式组合与买入跨式组合的区别是（）。', options: ['行权价不同', '到期日不同', '标的不同', '权利金不同'], answer: 0, explanation: '买入宽跨式组合（Long Strangle）与买入跨式组合的区别是行权价不同，宽跨式认购和认沽的行权价不同。' },
            { id: 63, type: '单选', question: '牛市价差组合是指（）。', options: ['买入低行权价认购，卖出高行权价认购', '卖出低行权价认购，买入高行权价认购', '买入认购和认沽', '卖出认购和认沽'], answer: 0, explanation: '牛市价差组合（Bull Call Spread）是指买入较低行权价的认购期权，同时卖出较高行权价的认购期权，预期标的小幅上涨。' },
            { id: 64, type: '单选', question: '熊市价差组合是指（）。', options: ['买入高行权价认沽，卖出低行权价认沽', '卖出高行权价认沽，买入低行权价认沽', '买入认购和认沽', '卖出认购和认沽'], answer: 0, explanation: '熊市价差组合（Bear Put Spread）是指买入较高行权价的认沽期权，同时卖出较低行权价的认沽期权，预期标的小幅下跌。' },
            { id: 65, type: '单选', question: '蝶式价差组合的预期是（）。', options: ['标的价格在特定区间波动', '标的价格大幅上涨', '标的价格大幅下跌', '标的价格大幅波动'], answer: 0, explanation: '蝶式价差组合（Butterfly Spread）预期标的价格在特定区间波动，适用于预期标的价格变动不大的情况。' },
            { id: 66, type: '单选', question: '铁鹰式价差组合的最大收益是（）。', options: ['收取的净权利金', '无限大', '行权价差', '标的价格'], answer: 0, explanation: '铁鹰式价差组合（Iron Condor）的最大收益是收取的净权利金，当标的价格在两个卖出期权行权价之间时获得最大收益。' },
            { id: 67, type: '单选', question: '领口策略是指（）。', options: ['买入标的，买入认沽，卖出认购', '买入标的，卖出认沽，买入认购', '卖出标的，买入认沽，卖出认购', '买入认购，卖出认沽'], answer: 0, explanation: '领口策略（Collar）是指持有标的资产，买入认沽期权作为保险，同时卖出认购期权收取权利金降低成本。' },
            { id: 68, type: '单选', question: '日历价差组合是指（）。', options: ['卖出近月期权，买入远月期权', '买入近月期权，卖出远月期权', '买入相同到期日的期权', '卖出相同到期日的期权'], answer: 0, explanation: '日历价差组合（Calendar Spread）是指卖出近月到期的期权，同时买入相同行权价但远月到期的期权，利用时间价值衰减差异获利。' },
            { id: 69, type: '单选', question: '对角价差组合是指（）。', options: ['不同行权价和不同到期日的期权组合', '相同行权价不同到期日的期权组合', '相同到期日不同行权价的期权组合', '相同行权价相同到期日的期权组合'], answer: 0, explanation: '对角价差组合（Diagonal Spread）是指买入和卖出的期权既有不同的行权价，又有不同的到期日。' },
            { id: 70, type: '单选', question: '比率价差组合是指（）。', options: ['买入和卖出的期权数量不同', '买入和卖出的期权行权价不同', '买入和卖出的期权到期日不同', '买入和卖出的期权类型不同'], answer: 0, explanation: '比率价差组合（Ratio Spread）是指买入和卖出的期权数量不同，通常卖出数量多于买入数量。' },
            { id: 71, type: '单选', question: '反向比率价差组合的风险是（）。', options: ['一边风险无限', '两边风险都有限', '没有风险', '只有时间风险'], answer: 0, explanation: '反向比率价差组合（Backspread）通常买入数量多于卖出数量，导致一边的风险是无限的（通常是认购期权方向）。' },
            { id: 72, type: '单选', question: '盒式价差组合的特点是（）。', options: ['无风险套利组合', '高风险高收益', '只适用于牛市', '只适用于熊市'], answer: 0, explanation: '盒式价差组合（Box Spread）是一种无风险套利组合，利用看涨看跌平价关系进行套利。' },
            { id: 73, type: '单选', question: '期权的隐含波动率是根据（）计算的。', options: ['期权市场价格反推', '历史价格统计', '标的资产波动', '无风险利率'], answer: 0, explanation: '隐含波动率是根据期权的市场价格，利用期权定价模型（如BS模型）反推出来的波动率。' },
            { id: 74, type: '单选', question: '波动率微笑是指（）。', options: ['不同行权价的期权隐含波动率呈微笑形状', '期权价格随时间变化', '标的资产价格波动', '期权交易量变化'], answer: 0, explanation: '波动率微笑是指不同行权价的期权隐含波动率呈现中间低、两边高的形状，类似微笑曲线。' },
            { id: 75, type: '单选', question: '波动率偏斜是指（）。', options: ['虚值认沽期权隐含波动率高于虚值认购', '虚值认购期权隐含波动率高于虚值认沽', '平值期权隐含波动率最高', '实值期权隐含波动率最高'], answer: 0, explanation: '波动率偏斜是指虚值认沽期权的隐含波动率通常高于虚值认购期权，反映了市场对下跌风险的担忧。' },
            
            // 投资者适当性管理 (76-100)
            { id: 76, type: '单选', question: '个人投资者开通期权交易权限，需要满足的资产条件是（）。', options: ['申请开户前20个交易日日均资产不低于50万元', '申请开户前10个交易日日均资产不低于50万元', '申请开户前20个交易日日均资产不低于100万元', '申请开户前30个交易日日均资产不低于50万元'], answer: 0, explanation: '个人投资者开通期权交易权限，需要满足申请开户前20个交易日日均证券市值与资金账户可用余额合计不低于人民币50万元。' },
            { id: 77, type: '单选', question: '个人投资者开通期权交易权限，需要具备的条件不包括（）。', options: ['在证券公司开户满6个月', '具备融资融券业务参与资格或金融期货交易经历', '通过交易所认可的知识测试', '必须有3年以上股票投资经验'], answer: 3, explanation: '个人投资者开通期权交易权限需要：在证券公司开户满6个月、具备融资融券业务参与资格或金融期货交易经历、通过交易所认可的知识测试等，但不要求必须有3年以上股票投资经验。' },
            { id: 78, type: '单选', question: '期权知识测试的成绩有效期为（）。', options: ['长期有效', '1个月', '3个月', '6个月'], answer: 0, explanation: '期权知识测试的成绩长期有效，投资者通过测试后，成绩不会过期。' },
            { id: 79, type: '单选', question: '期权投资者适当性管理中的"三有一无"是指（）。', options: ['有资产、有经验、有知识，无不良记录', '有资金、有账户、有权限，无风险', '有股票、有基金、有债券，无负债', '有收益、有策略、有经验，无亏损'], answer: 0, explanation: '期权投资者适当性管理的"三有一无"是指：有资产（50万元）、有经验（6个月）、有知识（通过测试），无不良诚信记录。' },
            { id: 80, type: '单选', question: '普通机构投资者开通期权交易权限，需要满足的资产条件是（）。', options: ['申请开户前20个交易日日均资产不低于100万元', '申请开户前20个交易日日均资产不低于50万元', '申请开户前10个交易日日均资产不低于100万元', '无资产要求'], answer: 0, explanation: '普通机构投资者开通期权交易权限，需要满足申请开户前20个交易日日均证券市值与资金账户可用余额合计不低于人民币100万元。' },
            { id: 81, type: '单选', question: '专业机构投资者开通期权交易权限（）。', options: ['无需进行适当性评估', '需要进行适当性评估', '只需通过知识测试', '只需满足资产要求'], answer: 0, explanation: '专业机构投资者（如商业银行、保险公司、证券公司等）开通期权交易权限无需进行适当性评估。' },
            { id: 82, type: '单选', question: '期权投资者的持仓限额根据（）分级设置。', options: ['投资者的交易权限级别', '投资者的资产规模', '投资者的交易经验', '以上都是'], answer: 3, explanation: '期权投资者的持仓限额根据投资者的交易权限级别、资产规模、交易经验等因素分级设置。' },
            { id: 83, type: '单选', question: '期权交易的一级权限包括（）。', options: ['备兑开仓、买入开仓', '备兑开仓、卖出开仓', '所有期权交易', '只能买入开仓'], answer: 0, explanation: '期权交易一级权限包括备兑开仓（持有标的卖出认购）和买入开仓（买入认购或认沽）。' },
            { id: 84, type: '单选', question: '期权交易的二级权限在一级基础上增加了（）。', options: ['卖出开仓', '买入开仓', '备兑开仓', '行权'], answer: 0, explanation: '期权交易二级权限在一级权限基础上增加了卖出开仓（作为卖方卖出认购或认沽），但需要缴纳保证金。' },
            { id: 85, type: '单选', question: '期权交易的三级权限包括（）。', options: ['所有期权交易', '只能买入开仓', '只能备兑开仓', '只能卖出开仓'], answer: 0, explanation: '期权交易三级权限包括所有期权交易，如买入开仓、卖出开仓、备兑开仓、组合策略等。' },
            { id: 86, type: '单选', question: '投资者申请提高交易权限级别需要（）。', options: ['满足相应条件并通过评估', '只需满足资产要求', '只需通过知识测试', '自动升级'], answer: 0, explanation: '投资者申请提高交易权限级别需要满足相应的资产、经验、知识等条件，并通过证券公司的评估。' },
            { id: 87, type: '单选', question: '期权投资者的风险承受能力评估（）进行一次。', options: ['每年', '每半年', '每季度', '每月'], answer: 0, explanation: '期权投资者的风险承受能力评估应当每年进行一次，以了解投资者风险承受能力的变化情况。' },
            { id: 88, type: '单选', question: '投资者风险承受能力发生变化时，应当（）。', options: ['及时告知证券公司重新评估', '继续按原级别交易', '自行调整交易策略', '暂停交易'], answer: 0, explanation: '投资者风险承受能力发生变化时，应当及时告知证券公司，重新进行风险承受能力评估。' },
            { id: 89, type: '单选', question: '证券公司对投资者进行适当性管理时，应当遵循（）原则。', options: ['将适当的产品销售给适当的投资者', '向所有投资者销售所有产品', '只向专业投资者销售', '只向个人投资者销售'], answer: 0, explanation: '证券公司对投资者进行适当性管理时，应当遵循"将适当的产品销售给适当的投资者"的原则。' },
            { id: 90, type: '单选', question: '投资者参与期权交易前应当签署（）。', options: ['风险揭示书', '盈利保证书', '交易委托书', '资金存管协议'], answer: 0, explanation: '投资者参与期权交易前应当签署《股票期权风险揭示书》，充分了解期权交易的风险。' },
            { id: 91, type: '单选', question: '期权交易的主要风险不包括（）。', options: ['本金保证收益', '杠杆风险', '时间损耗风险', '流动性风险'], answer: 0, explanation: '期权交易的主要风险包括杠杆风险、时间损耗风险、流动性风险等，但不包括本金保证收益，期权交易不保证收益。' },
            { id: 92, type: '单选', question: '期权买方的风险主要是（）。', options: ['损失权利金', '无限损失', '保证金不足', '强行平仓'], answer: 0, explanation: '期权买方的风险主要是损失支付的权利金，因为买方的最大损失就是权利金。' },
            { id: 93, type: '单选', question: '期权卖方的风险主要是（）。', options: ['可能承担较大损失', '损失权利金', '只能获得固定收益', '没有风险'], answer: 0, explanation: '期权卖方的风险主要是可能承担较大损失（认购卖方理论上无限损失），以换取有限的权利金收入。' },
            { id: 94, type: '单选', question: '投资者进行期权交易时，应当（）。', options: ['根据自身情况理性决策', '跟风交易', '满仓操作', '频繁交易'], answer: 0, explanation: '投资者进行期权交易时，应当根据自身资产状况、风险承受能力、投资经验等情况理性决策。' },
            { id: 95, type: '单选', question: '期权的强行平仓可能发生在（）情况。', options: ['保证金不足', '盈利过多', '持仓过少', '交易频繁'], answer: 0, explanation: '期权的强行平仓通常发生在投资者作为卖方时保证金不足，且未及时补足的情况下。' },
            { id: 96, type: '单选', question: '投资者应当如何管理期权交易风险？', options: ['合理控制仓位、设置止损、了解 Greeks', '满仓操作、不设止损', '只买不卖', '只卖不买'], answer: 0, explanation: '投资者应当合理控制仓位、设置止损点、了解 Greeks（Delta、Gamma、Theta、Vega）等风险管理工具来管理期权交易风险。' },
            { id: 97, type: '单选', question: '期权的流动性风险是指（）。', options: ['可能无法及时以合理价格买卖', '价格波动风险', '时间价值损耗', '行权风险'], answer: 0, explanation: '流动性风险是指某些期权合约可能交易不活跃，投资者可能无法及时以合理价格买入或卖出。' },
            { id: 98, type: '单选', question: '期权交易的操作风险是指（）。', options: ['因操作失误导致的损失', '市场波动导致的损失', '时间价值损耗', '波动率变化导致的损失'], answer: 0, explanation: '操作风险是指因投资者操作失误（如下错单、误操作等）导致的损失。' },
            { id: 99, type: '单选', question: '投资者参与期权交易应当具备的基本知识包括（）。', options: ['期权基本概念、交易规则、风险管理', '只需要知道如何买卖', '只需要知道如何盈利', '不需要任何知识'], answer: 0, explanation: '投资者参与期权交易应当具备期权基本概念、交易规则、风险管理等基本知识。' },
            { id: 100, type: '单选', question: '期权交易的结算风险是指（）。', options: ['交易对手方无法履约的风险', '市场波动风险', '时间价值损耗', '操作失误风险'], answer: 0, explanation: '结算风险是指交易对手方在结算时无法履约的风险，在集中清算制度下由结算机构承担。' },
            
            // 扩展题库 (101-200)
            { id: 101, type: '单选', question: '期权合约的标的资产为ETF的，其合约单位一般为（）。', options: ['1000份', '5000份', '10000份', '50000份'], answer: 2, explanation: 'ETF期权的合约单位一般为10000份，即每张期权合约对应10000份ETF基金份额。' },
            { id: 102, type: '单选', question: '以下关于期权买方和卖方的说法，正确的是（）。', options: ['买方和卖方都只有权利没有义务', '买方有权利没有义务，卖方有义务没有权利', '买方和卖方都既有权利又有义务', '买方没有权利只有义务，卖方有权利没有义务'], answer: 1, explanation: '期权买方支付权利金获得权利，没有义务；卖方收取权利金承担义务，没有权利。' },
            { id: 103, type: '单选', question: '以下关于期权时间价值的说法，正确的是（）。', options: ['时间价值只与到期时间有关', '时间价值与到期时间、波动率都有关', '时间价值只与波动率有关', '时间价值与行权价无关'], answer: 1, explanation: '时间价值与到期时间（剩余期限越长价值越大）、波动率（波动率越大价值越大）都有关。' },
            { id: 104, type: '单选', question: '深度实值认购期权的Delta值最接近（）。', options: ['0', '0.5', '1', '-1'], answer: 2, explanation: '深度实值认购期权的Delta值接近1，表示期权价格与标的资产价格几乎同幅度变动。' },
            { id: 105, type: '单选', question: '深度虚值认沽期权的Delta值最接近（）。', options: ['0', '0.5', '-1', '1'], answer: 0, explanation: '深度虚值认沽期权的Delta值接近0，表示期权价格对标的资产价格变动不敏感。' },
            { id: 106, type: '单选', question: '以下哪个因素会导致认购期权价格上涨（）。', options: ['标的资产价格下跌', '波动率上升', '到期时间缩短', '利率下降'], answer: 1, explanation: '波动率上升会增加期权买方的获利机会，因此会导致认购期权价格上涨。' },
            { id: 107, type: '单选', question: '以下哪个因素会导致认沽期权价格下跌（）。', options: ['标的资产价格下跌', '波动率下降', '到期时间延长', '利率下降'], answer: 1, explanation: '波动率下降会减少期权买方的获利机会，因此会导致认沽期权价格下跌。' },
            { id: 108, type: '单选', question: '投资者持有510300，同时卖出510300认购期权，这种策略称为（）。', options: ['保险策略', '备兑开仓', '跨式组合', '价差组合'], answer: 1, explanation: '持有标的资产同时卖出认购期权称为备兑开仓，通过收取权利金增强收益。' },
            { id: 109, type: '单选', question: '投资者持有510300，同时买入510300认沽期权，这种策略称为（）。', options: ['备兑开仓', '保险策略', '牛市价差', '熊市价差'], answer: 1, explanation: '持有标的资产同时买入认沽期权称为保险策略，为标的资产提供下跌保护。' },
            { id: 110, type: '单选', question: '以下关于期权保证金的描述，正确的是（）。', options: ['买方需要缴纳保证金', '卖方需要缴纳保证金', '买卖双方都需要缴纳保证金', '买卖双方都不需要缴纳保证金'], answer: 1, explanation: '期权买方支付权利金，不需要缴纳保证金；卖方需要缴纳保证金作为履约担保。' },
            { id: 111, type: '单选', question: '期权合约的实值、平值、虚值状态会随着（）的变化而变化。', options: ['只有标的资产价格', '标的资产价格和行权价', '只有行权价', '不会变化'], answer: 1, explanation: '期权的实值、平值、虚值状态取决于标的资产价格与行权价的相对关系。' },
            { id: 112, type: '单选', question: '以下关于期权到期日的描述，正确的是（）。', options: ['到期日当天必须行权', '到期日当天可以行权也可以放弃', '到期日前一天必须决定是否行权', '到期日后还可以行权'], answer: 1, explanation: '欧式期权在到期日当天可以行权也可以放弃，买方有选择权。' },
            { id: 113, type: '单选', question: '投资者买入一张510300购4月4000合约，到期时510300价格为4.100元，投资者（）。', options: ['一定会行权', '一定不会行权', '可以选择行权或放弃', '必须放弃'], answer: 2, explanation: '到期时标的价格4.100元大于行权价4.000元，期权为实值，投资者可以选择行权（有利可图）或放弃（通常不会）。' },
            { id: 114, type: '单选', question: '投资者卖出一张510300购4月4000合约，到期时510300价格为4.100元，（）。', options: ['投资者可以选择履约或不履约', '投资者必须履约', '投资者可以不履约', '由交易所决定是否履约'], answer: 1, explanation: '卖出认购期权后，如果买方行权，卖方有义务履约，必须按行权价卖出标的资产。' },
            { id: 115, type: '单选', question: '以下关于期权权利金的描述，正确的是（）。', options: ['权利金就是行权价', '权利金是买方向卖方支付的费用', '权利金是卖方向买方支付的费用', '权利金就是保证金'], answer: 1, explanation: '权利金是期权买方向卖方支付的费用，用于购买期权合约赋予的权利。' },
            { id: 116, type: '单选', question: '以下哪个不是影响期权价格的因素（）。', options: ['标的资产价格', '行权价', '投资者情绪', '到期时间'], answer: 2, explanation: '影响期权价格的因素包括标的资产价格、行权价、到期时间、波动率、利率等，投资者情绪不是直接影响因素。' },
            { id: 117, type: '单选', question: '期权合约的溢价率是指（）。', options: ['权利金与行权价的比值', '权利金与标的资产价格的比值', '行权价与标的资产价格的比值', '标的资产价格与行权价的比值'], answer: 1, explanation: '溢价率通常指权利金与标的资产价格的比值，反映期权价格相对于标的资产价格的水平。' },
            { id: 118, type: '单选', question: '以下关于期权杠杆的描述，正确的是（）。', options: ['期权的杠杆是固定的', '期权的杠杆会随着标的价格变化而变化', '期权没有杠杆', '期权的杠杆只与到期时间有关'], answer: 1, explanation: '期权的杠杆不是固定的，会随着标的价格、剩余期限、波动率等因素的变化而变化。' },
            { id: 119, type: '单选', question: '投资者预期510300将大幅上涨，最合适的策略是（）。', options: ['买入认沽期权', '卖出认购期权', '买入认购期权', '卖出认沽期权'], answer: 2, explanation: '预期标的资产大幅上涨时，买入认购期权可以获得杠杆收益，是最合适的策略。' },
            { id: 120, type: '单选', question: '投资者预期510300将大幅下跌，最合适的策略是（）。', options: ['买入认购期权', '卖出认沽期权', '买入认沽期权', '卖出认购期权'], answer: 2, explanation: '预期标的资产大幅下跌时，买入认沽期权可以获得杠杆收益，是最合适的策略。' },
            { id: 121, type: '单选', question: '投资者预期510300将小幅上涨，最合适的策略是（）。', options: ['买入平值认购期权', '买入实值认购期权', '卖出认沽期权', '买入虚值认购期权'], answer: 2, explanation: '预期小幅上涨时，卖出认沽期权可以在标的不跌或小幅上涨时获得权利金收入。' },
            { id: 122, type: '单选', question: '投资者预期510300将横盘震荡，最合适的策略是（）。', options: ['买入跨式组合', '卖出跨式组合', '买入认购期权', '买入认沽期权'], answer: 1, explanation: '预期横盘震荡时，卖出跨式组合（同时卖出认购和认沽）可以在标的价格稳定时获得权利金收入。' },
            { id: 123, type: '单选', question: '投资者预期510300将大幅波动，但不确定方向，最合适的策略是（）。', options: ['卖出跨式组合', '买入跨式组合', '卖出认购期权', '卖出认沽期权'], answer: 1, explanation: '预期大幅波动但不确定方向时，买入跨式组合（同时买入认购和认沽）可以在标的大幅上涨或下跌时获利。' },
            { id: 124, type: '单选', question: '以下关于备兑开仓的描述，错误的是（）。', options: ['需要持有标的资产', '可以获得权利金收入', '放弃了标的上涨的潜在收益', '适用于看跌后市'], answer: 3, explanation: '备兑开仓适用于温和看涨或看平后市，通过收取权利金增强收益，但放弃了大幅上涨时的部分收益。' },
            { id: 125, type: '单选', question: '以下关于保险策略的描述，错误的是（）。', options: ['需要持有标的资产', '需要支付权利金', '限制了标的上涨的收益', '为标的提供下跌保护'], answer: 2, explanation: '保险策略（买入认沽）需要支付权利金，为标的提供下跌保护，但不会限制标的上涨的收益（只是成本增加了权利金）。' },
            { id: 126, type: '单选', question: '期权合约的剩余期限为3个月，其时间价值通常（）剩余期限为1个月的同类型期权。', options: ['大于', '小于', '等于', '无法确定'], answer: 0, explanation: '在其他条件相同的情况下，剩余期限越长，时间价值越大，因为未来价格变动的不确定性更大。' },
            { id: 127, type: '单选', question: '标的资产价格不变，期权的时间价值会随着到期日临近而（）。', options: ['增加', '减少', '不变', '先增后减'], answer: 1, explanation: '时间价值会随着到期日临近而衰减，这种现象称为时间损耗，越临近到期衰减越快。' },
            { id: 128, type: '单选', question: '以下关于波动率的描述，正确的是（）。', options: ['波动率是期权价格的唯一决定因素', '波动率越大，期权价格越高', '波动率越小，期权价格越高', '波动率与期权价格无关'], answer: 1, explanation: '波动率越大，标的资产价格变动的不确定性越大，期权买方获利机会越大，因此期权价格越高。' },
            { id: 129, type: '单选', question: '历史波动率是根据（）计算的。', options: ['期权市场价格', '标的资产历史价格', '行权价', '利率'], answer: 1, explanation: '历史波动率是根据标的资产过去一段时间的历史价格数据计算得出的波动率。' },
            { id: 130, type: '单选', question: '隐含波动率是根据（）反推计算得出的。', options: ['标的资产历史价格', '期权市场价格', '行权价', '到期时间'], answer: 1, explanation: '隐含波动率是根据期权的市场价格，利用期权定价模型反推得出的波动率。' },
            { id: 131, type: '单选', question: '期权合约的流动性通常（）标的资产的流动性。', options: ['好于', '差于', '等于', '无法比较'], answer: 1, explanation: '期权合约的种类繁多（不同到期日、不同行权价），单个合约的交易量通常小于标的资产，因此流动性通常差于标的资产。' },
            { id: 132, type: '单选', question: '以下关于期权行权的描述，正确的是（）。', options: ['只有实值期权才有行权价值', '虚值期权也有行权价值', '所有期权都应该行权', '平值期权不应该行权'], answer: 0, explanation: '只有实值期权才有行权价值（行权有利可图），虚值和平值期权行权会造成损失或无益，通常会放弃行权。' },
            { id: 133, type: '单选', question: '投资者买入认购期权后，若标的资产价格上涨，期权的Delta值会（）。', options: ['增大', '减小', '不变', '变为负数'], answer: 0, explanation: '认购期权在标的价格上涨时，实值程度增加，Delta值会增大（向1靠近）。' },
            { id: 134, type: '单选', question: '投资者买入认沽期权后，若标的资产价格下跌，期权的Delta值会（）。', options: ['增大（向0靠近）', '减小（向-1靠近）', '不变', '变为正数'], answer: 1, explanation: '认沽期权在标的价格下跌时，实值程度增加，Delta值会减小（向-1靠近）。' },
            { id: 135, type: '单选', question: '期权合约的Gamma值在（）时最大。', options: ['深度实值', '平值', '深度虚值', '到期日'], answer: 1, explanation: 'Gamma在平值期权时最大，表示此时Delta对标的资产价格变化最敏感。' },
            { id: 136, type: '单选', question: '期权合约的Theta值通常为（）。', options: ['正数', '负数', '零', '无法确定'], answer: 1, explanation: 'Theta通常为负数，表示随着到期日临近，期权的时间价值会衰减（减少）。' },
            { id: 137, type: '单选', question: '期权合约的Vega值在（）时最大。', options: ['深度实值', '平值', '深度虚值', '到期日'], answer: 1, explanation: 'Vega在平值期权且剩余期限较长时最大，表示此时期权价格对波动率变化最敏感。' },
            { id: 138, type: '单选', question: '投资者卖出期权后，面临的风险主要是（）。', options: ['损失权利金', '可能承担较大损失', '没有风险', '只能获得固定收益'], answer: 1, explanation: '卖出期权后，卖方收取权利金但承担履约义务，可能面临较大损失（认购卖方理论上无限损失）。' },
            { id: 139, type: '单选', question: '投资者买入期权后，面临的风险主要是（）。', options: ['无限损失', '损失权利金', '保证金不足', '强行平仓'], answer: 1, explanation: '买入期权后，买方支付权利金获得权利，最大损失就是已支付的权利金，风险有限。' },
            { id: 140, type: '单选', question: '以下关于期权合约乘数的描述，正确的是（）。', options: ['ETF期权合约乘数为100', 'ETF期权合约乘数为1000', 'ETF期权合约乘数为10000', 'ETF期权合约乘数为100000'], answer: 2, explanation: 'ETF期权的合约乘数为10000，即一张期权合约对应10000份ETF基金份额。' },
            { id: 141, type: '单选', question: '投资者买入一张510300购4月4000合约，支付权利金500元，到期时510300价格为4.050元，投资者行权的盈亏为（）。', options: ['盈利500元', '亏损500元', '盈亏平衡', '盈利1000元'], answer: 0, explanation: '行权收益 = (4.050 - 4.000) × 10000 - 500 = 500 - 500 = 0，约等于盈亏平衡（根据精确计算）。' },
            { id: 142, type: '单选', question: '期权合约的价格变动单位（最小变动价位）为（）。', options: ['0.0001元', '0.001元', '0.01元', '0.1元'], answer: 0, explanation: 'ETF期权的最小变动价位为0.0001元（即0.01分）。' },
            { id: 143, type: '单选', question: '期权合约的涨跌幅限制为（）。', options: ['±10%', '±20%', '根据标的涨跌幅计算', '无涨跌幅限制'], answer: 2, explanation: '期权合约的涨跌停幅度根据标的ETF的涨跌幅和期权本身的价格计算得出，不是固定的百分比。' },
            { id: 144, type: '单选', question: '以下关于期权组合策略的描述，正确的是（）。', options: ['组合策略可以降低风险', '组合策略一定比单腿策略收益高', '组合策略不需要缴纳保证金', '组合策略只能在同一到期日构建'], answer: 0, explanation: '期权组合策略（如价差、跨式等）通常用于降低风险或调整风险收益特征。' },
            { id: 145, type: '单选', question: '牛市认购价差组合的最大收益为（）。', options: ['无限大', '收取的权利金', '两个行权价之差减去净权利金支出', '两个行权价之差'], answer: 2, explanation: '牛市认购价差组合的最大收益为两个行权价之差减去净权利金支出（如果净支出为正）或加上净权利金收入（如果净收入为正）。' },
            { id: 146, type: '单选', question: '熊市认沽价差组合的最大风险为（）。', options: ['无限大', '收取的权利金', '两个行权价之差减去净权利金收入', '净权利金支出'], answer: 3, explanation: '熊市认沽价差组合的最大风险为净权利金支出（如果净支出为正）或两个行权价之差减去净权利金收入（如果净收入为正）。' },
            { id: 147, type: '单选', question: '买入跨式组合的最大损失为（）。', options: ['无限大', '支付的权利金总和', '行权价之差', '零'], answer: 1, explanation: '买入跨式组合（同时买入认购和认沽）的最大损失为支付的权利金总和，当标的资产价格等于行权价时发生。' },
            { id: 148, type: '单选', question: '卖出跨式组合的最大收益为（）。', options: ['无限大', '收取的权利金总和', '行权价之差', '零'], answer: 1, explanation: '卖出跨式组合（同时卖出认购和认沽）的最大收益为收取的权利金总和，当标的资产价格等于行权价时获得。' },
            { id: 149, type: '单选', question: '买入跨式组合最适合的市场预期是（）。', options: ['标的大幅上涨', '标的大幅下跌', '标的大幅波动但方向不确定', '标的横盘震荡'], answer: 2, explanation: '买入跨式组合适合预期标的大幅波动但方向不确定的情况，无论大涨或大跌都可能获利。' },
            { id: 150, type: '单选', question: '卖出跨式组合最适合的市场预期是（）。', options: ['标的大幅上涨', '标的大幅下跌', '标的大幅波动', '标的横盘震荡'], answer: 3, explanation: '卖出跨式组合适合预期标的横盘震荡的情况，当标的在行权价附近波动时可以获得权利金收入。' },
            { id: 151, type: '单选', question: '期权合约的到期月份一般包括（）。', options: ['当月、下月及随后两个季月', '当月、下月及随后三个季月', '当月及随后三个月', '当月及随后六个月'], answer: 0, explanation: 'ETF期权的到期月份一般为当月、下月及随后两个季月（3月、6月、9月、12月）。' },
            { id: 152, type: '单选', question: '以下关于期权行权价格间距的描述，正确的是（）。', options: ['所有行权价格间距相同', '根据标的价格分档设置', '由交易所每日公布', '由做市商决定'], answer: 1, explanation: 'ETF期权的行权价格间距根据标的价格分档设置，如3元以下为0.05元，3元至5元为0.1元等。' },
            { id: 153, type: '单选', question: '期权合约的最后交易日为（）。', options: ['到期月份的第一个周三', '到期月份的第二个周三', '到期月份的第三个周三', '到期月份的第四个周三'], answer: 3, explanation: 'ETF期权的最后交易日为到期月份的第四个周三，遇法定节假日顺延。' },
            { id: 154, type: '单选', question: '期权合约的行权交收日为（）。', options: ['最后交易日当天', '最后交易日的下一个交易日', '到期月份的最后一个交易日', '到期月份的第三个周三'], answer: 1, explanation: 'ETF期权的行权交收日为最后交易日的下一个交易日，进行实物交割。' },
            { id: 155, type: '单选', question: '以下关于期权强行平仓的描述，正确的是（）。', options: ['只有买方会被强行平仓', '只有卖方会被强行平仓', '买卖双方都可能被强行平仓', '不会被强行平仓'], answer: 1, explanation: '期权卖方需要缴纳保证金，当保证金不足且未及时补足时，可能会被强行平仓。买方不需要缴纳保证金，不会被强行平仓。' },
            { id: 156, type: '单选', question: '投资者进行期权交易时，应当重点关注的风险不包括（）。', options: ['市场风险', '流动性风险', '操作风险', '无风险'], answer: 3, explanation: '期权交易存在市场风险、流动性风险、操作风险、时间损耗风险等多种风险，不存在无风险的情况。' },
            { id: 157, type: '单选', question: '以下关于期权权利仓限额的描述，正确的是（）。', options: ['所有投资者的限额相同', '根据投资者级别分级设置', '没有限额', '只能持有一张合约'], answer: 1, explanation: '期权权利仓限额根据投资者的交易权限级别、资产规模等因素分级设置，不同投资者的限额可能不同。' },
            { id: 158, type: '单选', question: '投资者申请开通期权交易权限，需要具备的条件不包括（）。', options: ['资产要求', '知识测试', '交易经验', '盈利记录'], answer: 3, explanation: '开通期权交易权限需要满足资产要求、通过知识测试、具备相应交易经验等，但不需要提供盈利记录。' },
            { id: 159, type: '单选', question: '期权知识测试的合格分数一般为（）。', options: ['60分', '70分', '80分', '90分'], answer: 2, explanation: '期权知识测试的合格分数一般为80分（满分100分），投资者需要达到合格分数才能开通期权交易权限。' },
            { id: 160, type: '单选', question: '以下关于期权投资者适当性的描述，正确的是（）。', options: ['所有投资者都可以参与期权交易', '投资者需要满足适当性要求才能参与', '只有专业投资者可以参与', '只有机构投资者可以参与'], answer: 1, explanation: '期权交易实行投资者适当性管理，投资者需要满足相应的资产、知识、经验等要求才能参与期权交易。' },
            { id: 161, type: '单选', question: '期权合约的标的资产发生分红、拆股等情况时，期权合约会（）。', options: ['不作调整', '相应调整行权价和合约单位', '自动平仓', '暂停交易'], answer: 1, explanation: '当标的资产发生分红、拆股、并股等情况时，期权合约会进行相应调整，调整行权价和合约单位，以保护期权持有者的权益。' },
            { id: 162, type: '单选', question: '以下关于期权做市商的描述，正确的是（）。', options: ['做市商只为买方提供服务', '做市商只为卖方提供服务', '做市商为市场提供双边报价', '做市商只参与集合竞价'], answer: 2, explanation: '做市商是指经交易所认可，为市场提供双边报价，接受投资者买卖要求的机构，为期权市场提供流动性。' },
            { id: 163, type: '单选', question: '投资者通过期权交易可以实现的目的不包括（）。', options: ['杠杆投资', '风险管理', '套利交易', '保本保收益'], answer: 3, explanation: '期权交易可以实现杠杆投资、风险管理（对冲）、套利交易等目的，但不能保本保收益，期权交易存在风险。' },
            { id: 164, type: '单选', question: '以下关于期权与期货区别的描述，正确的是（）。', options: ['期权和期货的权利义务相同', '期权买方只有权利没有义务，期货买卖双方都有义务', '期权和期货的杠杆相同', '期权和期货的到期日相同'], answer: 1, explanation: '期权买方只有权利没有义务，卖方只有义务没有权利；期货买卖双方都有履约义务。这是期权与期货的重要区别。' },
            { id: 165, type: '单选', question: '期权合约的内在价值（）。', options: ['一定大于零', '一定等于零', '大于或等于零', '小于零'], answer: 2, explanation: '期权的内在价值大于或等于零，实值期权内在价值为正，平值和虚值期权内在价值为零。' },
            { id: 166, type: '单选', question: '期权合约的时间价值（）。', options: ['一定大于零', '一定等于零', '大于或等于零', '小于零'], answer: 2, explanation: '期权的时间价值大于或等于零，到期日当天时间价值为零。' },
            { id: 167, type: '单选', question: '以下关于期权定价的描述，正确的是（）。', options: ['期权价格只与标的资产价格有关', '期权价格由内在价值和时间价值组成', '期权价格只与到期时间有关', '期权价格等于行权价'], answer: 1, explanation: '期权价格（权利金）由内在价值和时间价值两部分组成，内在价值是立即行权可以获得的收益，时间价值是未来价格变动可能带来的额外收益。' },
            { id: 168, type: '单选', question: '投资者买入一张510300购4月4000合约，权利金为0.0500元，该期权的内在价值为（）。（假设当前510300价格为4.050元）', options: ['0元', '0.0500元', '0.1000元', '0.5000元'], answer: 1, explanation: '内在价值 = 标的资产价格 - 行权价 = 4.050 - 4.000 = 0.0500元（认购期权）。' },
            { id: 169, type: '单选', question: '投资者买入一张510300沽4月4000合约，权利金为0.0800元，该期权的内在价值为（）。（假设当前510300价格为3.900元）', options: ['0元', '0.0800元', '0.1000元', '0.5000元'], answer: 2, explanation: '内在价值 = 行权价 - 标的资产价格 = 4.000 - 3.900 = 0.1000元（认沽期权）。' },
            { id: 170, type: '单选', question: '投资者买入一张510300购4月4000合约，权利金为0.1000元，该期权的时间价值为（）。（假设当前510300价格为4.050元）', options: ['0元', '0.0500元', '0.1000元', '0.1500元'], answer: 1, explanation: '内在价值 = 4.050 - 4.000 = 0.0500元，时间价值 = 权利金 - 内在价值 = 0.1000 - 0.0500 = 0.0500元。' },
            { id: 171, type: '单选', question: '以下关于期权对冲的描述，正确的是（）。', options: ['期权不能用于对冲', '期权可以用于对冲标的资产的风险', '期权对冲没有成本', '期权对冲一定能盈利'], answer: 1, explanation: '期权可以用于对冲标的资产的风险，如持有标的资产时买入认沽期权进行保险，但需要支付权利金成本。' },
            { id: 172, type: '单选', question: '投资者持有510300，为对冲下跌风险，应该（）。', options: ['买入认购期权', '卖出认购期权', '买入认沽期权', '卖出认沽期权'], answer: 2, explanation: '持有标的资产时，买入认沽期权可以在标的下跌时获得补偿，从而对冲下跌风险，这是保险策略。' },
            { id: 173, type: '单选', question: '投资者预期510300将在3.900-4.100之间波动，可以构建（）策略。', options: ['买入跨式组合', '卖出跨式组合', '买入认购期权', '买入认沽期权'], answer: 1, explanation: '预期标的在一定区间内波动时，卖出跨式组合（同时卖出认购和认沽）可以在标的价格在区间内时获得权利金收入。' },
            { id: 174, type: '单选', question: '投资者预期510300将突破盘整区间，可以构建（）策略。', options: ['卖出跨式组合', '买入跨式组合', '卖出认购期权', '卖出认沽期权'], answer: 1, explanation: '预期标的将突破盘整区间（大幅波动但方向不确定）时，买入跨式组合可以在大涨或大跌时获利。' },
            { id: 175, type: '单选', question: '以下关于期权希腊字母的描述，正确的是（）。', options: ['Delta表示期权价格对时间的敏感度', 'Theta表示期权价格对波动率的敏感度', 'Vega表示期权价格对波动率的敏感度', 'Gamma表示期权价格对利率的敏感度'], answer: 2, explanation: 'Vega表示期权价格对波动率变化的敏感度，即波动率每变化1%时期权价格的变化金额。' },
            { id: 176, type: '单选', question: '投资者买入期权后，Gamma值为正意味着（）。', options: ['Delta值会随标的价格上涨而增大', 'Delta值会随标的价格上涨而减小', 'Theta值为正', 'Vega值为负'], answer: 0, explanation: '买入期权的Gamma为正，意味着Delta值会随标的价格上涨而增大（认购）或减小（认沽，向-1靠近），即Delta的变化方向与标的价格变化方向相同。' },
            { id: 177, type: '单选', question: '投资者卖出期权后，Gamma值为负意味着（）。', options: ['风险有限', 'Delta值的变化对卖方不利', '一定盈利', '不需要缴纳保证金'], answer: 1, explanation: '卖出期权的Gamma为负，意味着标的价格变动时，Delta的变化方向对卖方不利，风险可能增大。' },
            { id: 178, type: '单选', question: '以下关于期权到期日的描述，错误的是（）。', options: ['到期日当天可以行权', '到期日后期权失效', '到期日前一天必须平仓', '到期日当天可以放弃行权'], answer: 2, explanation: '期权在到期日当天可以行权或放弃，也可以在到期日前平仓，但没有必须在到期日前一天平仓的规定。' },
            { id: 179, type: '单选', question: '投资者买入一张510300购4月4000合约，支付权利金800元，到期时选择放弃行权，其损失为（）。', options: ['0元', '800元', '无限大', '取决于标的价格'], answer: 1, explanation: '买入期权后放弃行权，最大损失就是已支付的权利金800元。' },
            { id: 180, type: '单选', question: '投资者卖出一张510300购4月4000合约，收取权利金800元，到期时买方放弃行权，其收益为（）。', options: ['0元', '800元', '无限大', '取决于标的价格'], answer: 1, explanation: '卖出期权后，如果买方放弃行权，卖方获得全部权利金收入800元。' },
            { id: 181, type: '单选', question: '以下关于期权自动行权的描述，正确的是（）。', options: ['所有实值期权都会自动行权', '深度实值期权可能自动行权', '虚值期权也会自动行权', '不会自动行权'], answer: 1, explanation: '对于实值期权，交易所可能会根据规则进行自动行权（特别是深度实值），但投资者也可以主动选择放弃行权。' },
            { id: 182, type: '单选', question: '投资者参与期权交易前，应当充分了解（）。', options: ['期权的交易规则和风险', '期权的盈利保证', '期权的保本机制', '期权的无风险特性'], answer: 0, explanation: '投资者参与期权交易前，应当充分了解期权的交易规则、风险收益特征等，不应误解为期权保本或无风险。' },
            { id: 183, type: '单选', question: '以下关于期权交易成本的描述，正确的是（）。', options: ['期权交易没有成本', '期权交易成本只有权利金', '期权交易成本包括权利金、手续费等', '期权交易成本只包括手续费'], answer: 2, explanation: '期权交易成本包括买方支付的权利金、买卖双方支付的手续费（交易经手费、结算费等）等。' },
            { id: 184, type: '单选', question: '投资者进行期权交易时，应当避免的行为包括（）。', options: ['充分了解产品', '合理控制仓位', '盲目跟风交易', '设置止损点'], answer: 2, explanation: '投资者进行期权交易时应当充分了解产品、合理控制仓位、设置止损点，避免盲目跟风交易。' },
            { id: 185, type: '单选', question: '以下关于期权波动率交易（Volatility Trading）的描述，正确的是（）。', options: ['根据对波动率的判断进行交易', '只买入期权', '只卖出期权', '不需要判断波动率'], answer: 0, explanation: '波动率交易是指根据对标的资产未来波动率的判断进行期权交易，如预期波动率上升时买入期权，预期波动率下降时卖出期权。' },
            { id: 186, type: '单选', question: '投资者预期市场波动率将上升，应该（）。', options: ['卖出期权', '买入期权', '不交易', '只买入认购期权'], answer: 1, explanation: '预期波动率上升时，期权价格通常会上涨，因此买入期权可以在波动率上升时获利。' },
            { id: 187, type: '单选', question: '投资者预期市场波动率将下降，应该（）。', options: ['买入期权', '卖出期权', '不交易', '只卖出认购期权'], answer: 1, explanation: '预期波动率下降时，期权价格通常会下跌，因此卖出期权可以在波动率下降时获利（收取权利金）。' },
            { id: 188, type: '单选', question: '以下关于期权套利的描述，正确的是（）。', options: ['期权套利没有风险', '期权套利是利用价格失衡获利', '期权套利一定能盈利', '期权套利不需要资金'], answer: 1, explanation: '期权套利是利用期权市场或期权与标的资产之间的价格失衡，通过构建对冲组合获利，理论上风险较低，但仍存在操作风险、模型风险等。' },
            { id: 189, type: '单选', question: '转换套利（Conversion Arbitrage）涉及的交易包括（）。', options: ['买入标的、买入认沽、卖出认购', '卖出标的、卖出认沽、买入认购', '买入标的、卖出认沽、买入认购', '卖出标的、买入认沽、卖出认购'], answer: 0, explanation: '转换套利通常涉及买入标的资产、买入认沽期权、卖出认购期权（相同行权价和到期日），利用看涨看跌平价关系进行套利。' },
            { id: 190, type: '单选', question: '反向转换套利（Reversal Arbitrage）涉及的交易包括（）。', options: ['买入标的、买入认沽、卖出认购', '卖出标的、卖出认沽、买入认购', '买入标的、卖出认沽、买入认购', '卖出标的、买入认沽、卖出认购'], answer: 1, explanation: '反向转换套利与转换套利相反，通常涉及卖出标的资产、卖出认沽期权、买入认购期权。' },
            { id: 191, type: '单选', question: '以下关于期权盒式套利（Box Spread）的描述，正确的是（）。', options: ['利用不同到期日的期权套利', '利用不同行权价的认购和认沽套利', '无风险套利', '高风险套利'], answer: 2, explanation: '盒式套利是一种理论上的无风险套利策略，利用看涨看跌平价关系，通过构建特定组合获得无风险收益。' },
            { id: 192, type: '单选', question: '期权交易中的"裸卖"（Naked Selling）是指（）。', options: ['持有标的卖出期权', '不持有标的卖出期权', '买入期权', '同时买入和卖出期权'], answer: 1, explanation: '裸卖是指不持有标的资产或相应对冲头寸的情况下卖出期权，风险较高，通常需要较高的保证金。' },
            { id: 193, type: '单选', question: '以下关于期权 covered writing 的描述，正确的是（）。', options: ['裸卖期权', '持有标的卖出认购期权', '买入认购期权', '买入认沽期权'], answer: 1, explanation: 'Covered writing即备兑开仓，是指持有标的资产的同时卖出认购期权，风险相对较小。' },
            { id: 194, type: '单选', question: '投资者买入一张510300购4月4000合约，权利金为0.0800元，该期权的盈亏平衡点为（）。', options: ['3.920元', '4.000元', '4.080元', '4.800元'], answer: 2, explanation: '认购期权的盈亏平衡点 = 行权价 + 权利金 = 4.000 + 0.0800 = 4.080元。' },
            { id: 195, type: '单选', question: '投资者买入一张510300沽4月4000合约，权利金为0.0800元，该期权的盈亏平衡点为（）。', options: ['3.920元', '4.000元', '4.080元', '4.800元'], answer: 0, explanation: '认沽期权的盈亏平衡点 = 行权价 - 权利金 = 4.000 - 0.0800 = 3.920元。' },
            { id: 196, type: '单选', question: '以下关于期权价格上下限的描述，正确的是（）。', options: ['认购期权价格可以高于标的价格', '认沽期权价格可以高于行权价', '认购期权价格不会超过标的价格', '期权价格没有限制'], answer: 2, explanation: '认购期权的价格上限为标的资产价格（不会高于直接买入标的的成本），认沽期权的价格上限为行权价。' },
            { id: 197, type: '单选', question: '投资者同时买入一张510300购4月4000合约和一张510300沽4月4000合约，这种策略称为（）。', options: ['牛市价差', '熊市价差', '跨式组合', '蝶式组合'], answer: 2, explanation: '同时买入相同行权价、相同到期日的认购和认沽期权称为跨式组合（Straddle）。' },
            { id: 198, type: '单选', question: '投资者同时卖出一张510300购4月4000合约和一张510300沽4月4000合约，这种策略称为（）。', options: ['买入跨式', '卖出跨式', '买入宽跨式', '卖出宽跨式'], answer: 1, explanation: '同时卖出相同行权价、相同到期日的认购和认沽期权称为卖出跨式组合（Short Straddle）。' },
            { id: 199, type: '单选', question: '以下关于期权投资风险的描述，正确的是（）。', options: ['期权买方没有风险', '期权卖方风险有限', '期权交易存在多种风险', '期权交易保本'], answer: 2, explanation: '期权交易存在市场风险、流动性风险、时间损耗风险、操作风险等多种风险，买方和卖方都面临各自的风险。' },
            { id: 200, type: '单选', question: '投资者参与期权交易，应当遵循的原则是（）。', options: ['理性投资、量力而行', '追涨杀跌、满仓操作', '频繁交易、追求刺激', '盲目跟风、听信消息'], answer: 0, explanation: '投资者参与期权交易应当遵循理性投资、量力而行的原则，根据自身情况做出投资决策，避免盲目跟风、追涨杀跌等行为。' }
        ];
        
        let currentQuestions = [];
        let currentQuestion = 0;
        let answers = [];
        let timeLeft = 1800;
        let timerInterval;
        let examSubmitted = false;
        
        // 从题库随机抽取30题
        function selectQuestions() {
            const shuffled = [...questionBank].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, 30);
        }
        
        // 开始考试
        function startExam() {
            currentQuestions = selectQuestions();
            answers = new Array(30).fill(-1);
            currentQuestion = 0;
            examSubmitted = false;
            timeLeft = 1800;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('examContainer').style.display = 'block';
            document.getElementById('actionBar').style.display = 'flex';
            
            renderQuestion();
            startTimer();
            updateButtons();
        }
        
        // 渲染题目
        function renderQuestion() {
            const q = currentQuestions[currentQuestion];
            const area = document.getElementById('questionArea');
            
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const selected = answers[currentQuestion] === idx ? 'selected' : '';
                const label = String.fromCharCode(65 + idx);
                optionsHtml += `
                    <li class="option-item ${selected}" onclick="selectOption(${idx})">
                        <span class="option-label">${label}</span>
                        <span class="option-text">${opt}</span>
                    </li>
                `;
            });
            
            const showExplanation = examSubmitted ? 'show' : '';
            
            area.innerHTML = `
                <div class="question-card">
                    <span class="question-number">第${currentQuestion + 1}题</span>
                    <div class="question-text">${q.question}</div>
                    <ul class="options-list">${optionsHtml}</ul>
                    <div class="explanation ${showExplanation}">
                        <div class="explanation-title">✓ 正确答案：${String.fromCharCode(65 + q.answer)}</div>
                        <div class="explanation-text">${q.explanation}</div>
                    </div>
                </div>
            `;
            
            document.getElementById('progressText').textContent = `${currentQuestion + 1}/30`;
            document.getElementById('progressBar').style.width = `${((currentQuestion + 1) / 30) * 100}%`;
        }
        
        // 选择选项
        function selectOption(idx) {
            if (examSubmitted) return;
            answers[currentQuestion] = idx;
            renderQuestion();
        }
        
        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                renderQuestion();
                updateButtons();
            }
        }
        
        // 下一题
        function nextQuestion() {
            if (currentQuestion < 29) {
                currentQuestion++;
                renderQuestion();
                updateButtons();
            }
        }
        
        // 更新按钮
        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            
            if (currentQuestion === 29) {
                document.getElementById('nextBtn').style.display = 'none';
                document.getElementById('submitBtn').style.display = 'block';
            } else {
                document.getElementById('nextBtn').style.display = 'block';
                document.getElementById('submitBtn').style.display = 'none';
            }
        }
        
        // 计时器
        function startTimer() {
            timerInterval = setInterval(() => {
                timeLeft--;
                const minutes = Math.floor(timeLeft / 60);
                const seconds = timeLeft % 60;
                document.getElementById('timer').textContent = 
                    `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                if (timeLeft <= 300) {
                    document.getElementById('timer').classList.add('warning');
                }
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitExam();
                }
            }, 1000);
        }
        
        // 提交试卷
        function submitExam() {
            if (examSubmitted) return;
            
            const answeredCount = answers.filter(a => a !== -1).length;
            if (answeredCount < 30) {
                if (!confirm(`您还有${30 - answeredCount}题未答，确定要提交吗？`)) {
                    return;
                }
            }
            
            clearInterval(timerInterval);
            examSubmitted = true;
            
            let correctCount = 0;
            answers.forEach((ans, idx) => {
                if (ans === currentQuestions[idx].answer) correctCount++;
            });
            
            const score = Math.round((correctCount / 30) * 100);
            const timeUsed = 1800 - timeLeft;
            
            localStorage.setItem('lastExamScore', score);
            localStorage.setItem('lastExamTime', new Date().toISOString());
            
            let mistakes = JSON.parse(localStorage.getItem('mistakes') || '[]');
            answers.forEach((ans, idx) => {
                if (ans !== currentQuestions[idx].answer) {
                    const q = currentQuestions[idx];
                    if (!mistakes.find(m => m.id === q.id)) {
                        mistakes.push({
                            id: q.id,
                            question: q.question,
                            correctAnswer: q.answer,
                            userAnswer: ans,
                            explanation: q.explanation,
                            timestamp: new Date().toISOString()
                        });
                    }
                }
            });
            localStorage.setItem('mistakes', JSON.stringify(mistakes));
            
            showResult(score, correctCount, timeUsed);
        }
        
        // 显示结果
        function showResult(score, correctCount, timeUsed) {
            document.getElementById('examContainer').style.display = 'none';
            document.getElementById('actionBar').style.display = 'none';
            document.getElementById('timer').style.display = 'none';
            
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.classList.add('show');
            
            document.getElementById('scoreValue').textContent = score;
            
            const resultEl = document.getElementById('scoreResult');
            if (score >= 80) {
                resultEl.textContent = '✓ 考试通过';
                resultEl.className = 'score-result pass';
            } else {
                resultEl.textContent = '✗ 未通过';
                resultEl.className = 'score-result fail';
            }
            
            const minutes = Math.floor(timeUsed / 60);
            const seconds = timeUsed % 60;
            document.getElementById('timeUsed').textContent = `${minutes}分${seconds}秒`;
            document.getElementById('correctCount').textContent = `${correctCount}/30`;
            document.getElementById('accuracy').textContent = `${Math.round((correctCount/30)*100)}%`;
        }
        
        // 查看解析
        function reviewExam() {
            currentQuestion = 0;
            examSubmitted = true;
            document.getElementById('examContainer').style.display = 'block';
            document.getElementById('actionBar').style.display = 'flex';
            document.getElementById('resultContainer').classList.remove('show');
            document.getElementById('timer').textContent = '解析模式';
            renderQuestion();
        }
    </script>
</body>
</html>
